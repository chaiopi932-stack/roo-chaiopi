<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Midgard Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎮 背景 -->
<div class="bg"></div>
<div class="fog"></div>
<div class="vignette"></div>

<!-- 🪟 LOGIN -->
<div class="window" id="login">
  <div class="title">Login Window</div>

  <div class="content">
    <div id="typing"></div>

    <input placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button onclick="login()">OK</button>

    <div class="links">Create Account ｜ Find Password</div>
  </div>
</div>

<!-- ⏳ LOADING -->
<div class="loading" id="loading">
  Entering Midgard...
</div>

<!-- 🎮 GAME -->
<div class="game" id="game">
  GAME START
</div>

<script src="game.js"></script>

</body>
</html>
