<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RPG Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* =========================
   背景（滿版）
========================= */
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;

  background: url("https://raw.githubusercontent.com/chaiopi932-stack/roo-chaiopi/main/assets/bg/background.png")
    center/cover no-repeat;
  position: relative;
}

/* 暗層（讓 UI 更清楚） */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.15);
}

/* =========================
   登入視窗（中央）
========================= */
.window {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 430px;
  background: rgba(20,20,20,0.92);
  border: 1px solid #d8b46a;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  z-index: 10;
}

/* title bar */
.title {
  background: linear-gradient(#f3e2b0, #caa457);
  padding: 8px 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #2a1a05;
}

/* content */
.content {
  padding: 18px;
  color: white;
}

.welcome {
  margin-bottom: 12px;
  font-size: 14px;
  color: #e7d49a;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;

  background: #111;
  border: 1px solid #444;
  color: white;
  outline: none;
}

/* OK button（重點金色） */
button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;

  background: linear-gradient(#f7d98a, #b8862b);
  border: 1px solid #7a5a1f;

  font-weight: bold;
  cursor: pointer;
}

button:hover {
  filter: brightness(1.1);
}

/* 底部文字 */
.links {
  margin-top: 10px;
  font-size: 12px;
  color: #d7c69a;
  text-align: center;
}

/* =========================
   右側伺服器列表
========================= */
.server {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}

.server div {
  width: 90px;
  margin: 6px 0;
  padding: 6px 10px;

  background: rgba(0,0,0,0.55);
  border: 1px solid #caa457;
  color: white;
  font-size: 13px;
  text-align: center;

  cursor: pointer;
}

.server div:hover {
  background: rgba(202,164,87,0.25);
}
</style>
</head>

<body>

<!-- 登入框 -->
<div class="window">
  <div class="title">
    <span>Login Window</span>
    <span>×</span>
  </div>

  <div class="content">
    <div class="welcome">Welcome to Midgard.</div>

    <input placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button>OK</button>

    <div class="links">
      Create Account | Find Password
    </div>
  </div>
</div>

<!-- 右側 server -->
<div class="server">
  <div>Prontera</div>
  <div>Geffen</div>
  <div>Izlude</div>
  <div>Alberta</div>
</div>

</body>
</html>
