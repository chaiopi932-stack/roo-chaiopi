<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RO 2D MMO V3</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  overflow: hidden;
  background: black;
}

/* ================= SCENE ================= */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.scene.active {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* ================= LOGIN ================= */
input, button {
  margin: 5px;
  padding: 10px;
}

/* ================= CHAR ================= */
.char {
  padding: 10px;
  background: #222;
  margin: 10px;
  cursor: pointer;
  color: white;
}

/* ================= GAME WORLD ================= */
#game {
  background: url("https://raw.githubusercontent.com/chaiopi932-stack/roo-chaiopi/main/assets/bg/background.png")
    center/cover no-repeat;
}

/* player */
#player {
  width: 30px;
  height: 30px;
  background: gold;
  position: absolute;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="scene active">
  <div>
    <h2>LOGIN</h2>
    <input placeholder="Account">
    <input type="password" placeholder="Password">
    <button onclick="goChar()">Login</button>
  </div>
</div>

<!-- CHAR -->
<div id="char" class="scene">
  <div>
    <h2>Select Job</h2>
    <div class="char" onclick="enterGame()">⚔ Swordman</div>
    <div class="char" onclick="enterGame()">🔮 Mage</div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="scene">
  <div id="player"></div>
</div>

<script>

let player = {
  x: 100,
  y: 100,
  speed: 5
};

/* ================= SCENE ================= */
function show(scene) {
  document.querySelectorAll(".scene").forEach(s => {
    s.classList.remove("active");
  });

  document.getElementById(scene).classList.add("active");
}

/* ================= LOGIN ================= */
function goChar() {
  show("char");
}

/* ================= GAME ================= */
function enterGame() {
  show("game");
  updatePlayer();
}

/* ================= MOVEMENT ================= */
document.addEventListener("keydown", (e) => {

  if (document.getElementById("game").classList.contains("active")) {

    if (e.key === "w") player.y -= player.speed;
    if (e.key === "s") player.y += player.speed;
    if (e.key === "a") player.x -= player.speed;
    if (e.key === "d") player.x += player.speed;

    updatePlayer();
  }
});

/* ================= RENDER ================= */
function updatePlayer() {
  const p = document.getElementById("player");

  p.style.left = player.x + "px";
  p.style.top = player.y + "px";
}

</script>

</body>
</html>
