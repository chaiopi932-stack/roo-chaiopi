<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RO Walk Prototype</title>

<style>
body {
  margin: 0;
  overflow: hidden;

  background: url("/mnt/data/image(395).png") center/cover no-repeat;
}

/* 🌍 世界 */
#world {
  position: absolute;
  width: 2000px;
  height: 2000px;
}

/* 👤 玩家 */
#player {
  position: absolute;
  width: 40px;
  height: 40px;

  background: gold;
  border-radius: 6px;
}

/* 🧭 camera */
#camera {
  position: absolute;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
</style>
</head>

<body>

<div id="camera">
  <div id="world">
    <div id="player"></div>
  </div>
</div>

<script src="game.js"></script>

</body>
</html>
