<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RPG Login Fixed</title>

<style>
/* ===== 基礎 ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* ===== 背景（重點修正） ===== */
body {
  width: 100vw;
  height: 100vh;

  /* ⚠️ 這裡一定要換成你的圖 */
  background: url("https://raw.githubusercontent.com/chaiopi932-stack/roo-chaiopi/main/assets/bg/background.png") center center / cover no-repeat;

  overflow: hidden;
  position: relative;
}

/* ===== 暗色遮罩（讓 UI 清楚） ===== */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

/* ===== 登入框置中（重點修正） ===== */
.window {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 420px;
  background: rgba(25,25,25,0.92);
  border: 1px solid #d6b25e;
  z-index: 10;
}

/* ===== title ===== */
.title {
  background: linear-gradient(#f4e3b2, #c8a45a);
  padding: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

/* ===== content ===== */
.content {
  padding: 20px;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;

  background: #111;
  border: 1px solid #444;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  background: linear-gradient(#f7d98a, #b8862b);
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* ===== server（固定右側） ===== */
.server {
  position: absolute;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}

.server div {
  background: rgba(0,0,0,0.6);
  border: 1px solid #c8a45a;
  color: white;
  padding: 8px 12px;
  margin: 6px 0;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="window">

  <div class="title">
    <span>Login Window</span>
    <span>×</span>
  </div>

  <div class="content">
    <p style="color:#e6d39a;margin-bottom:10px;">
      Welcome to Midgard.
    </p>

    <input placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button>OK</button>

    <p style="text-align:center;margin-top:10px;font-size:12px;color:#cdbb8a;">
      Create Account | Find Password
    </p>
  </div>
</div>

<!-- server -->
<div class="server">
  <div>Prontera</div>
  <div>Geffen</div>
  <div>Izlude</div>
  <div>Alberta</div>
</div>

</body>
</html>
