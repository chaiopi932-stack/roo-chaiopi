<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>MMO Scene System V2 FULL</title>

<style>
* {
  margin: 0;
  padding: 0;
  font-family: Arial;
  box-sizing: border-box;
}

body {
  background: black;
  overflow: hidden;
  color: white;
}

/* ================= SCENES ================= */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;

  justify-content: center;
  align-items: center;
  flex-direction: column;

  opacity: 0;
  transition: opacity 0.6s ease;
}

.scene.active {
  display: flex;
  opacity: 1;
}

/* ================= FADE ================= */
#fade {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 999;
}

/* ================= UI ================= */
input {
  margin: 5px;
  padding: 10px;
}

button {
  padding: 10px 20px;
  cursor: pointer;
}

/* ================= LOADING ================= */
.bar-bg {
  width: 300px;
  height: 20px;
  background: #333;
}

.bar {
  height: 20px;
  width: 0%;
  background: gold;
}

/* ================= CHAR ================= */
.char {
  padding: 10px 20px;
  margin: 10px;
  background: #222;
  cursor: pointer;
  border: 1px solid #444;
}

.char:hover {
  background: #333;
}

/* ================= GAME ================= */
#game {
  background: #111;
}
</style>
</head>

<body>

<div id="fade"></div>

<!-- ================= LOGIN ================= -->
<div id="login" class="scene active">
  <h2>LOGIN</h2>
  <input placeholder="Account">
  <input type="password" placeholder="Password">
  <button onclick="goLoading()">Login</button>
</div>

<!-- ================= LOADING ================= -->
<div id="loading" class="scene">
  <h2>Loading World...</h2>
  <div class="bar-bg">
    <div class="bar"></div>
  </div>
</div>

<!-- ================= CHARACTER ================= -->
<div id="char" class="scene">
  <h2>Select Character</h2>

  <div class="char" onclick="enterGame('swordman')">⚔ Swordman</div>
  <div class="char" onclick="enterGame('mage')">🔮 Mage</div>
  <div class="char" onclick="enterGame('archer')">🏹 Archer</div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="scene">
  <h2>GAME WORLD</h2>
</div>

<script>

/* ================= STATE ================= */
let currentScene = "login";
let selectedJob = null;

/* ================= SCENE SYSTEM ================= */
function showScene(name) {

  const fade = document.getElementById("fade");

  fade.style.opacity = 1;

  setTimeout(() => {

    document.querySelectorAll(".scene").forEach(s => {
      s.classList.remove("active");
    });

    document.getElementById(name).classList.add("active");

    currentScene = name;

    fade.style.opacity = 0;

  }, 300);
}

/* ================= LOGIN FLOW ================= */
function goLoading() {
  showScene("loading");

  let p = 0;
  let bar = document.querySelector(".bar");

  let t = setInterval(() => {
    p += 2;
    bar.style.width = p + "%";

    if (p >= 100) {
      clearInterval(t);
      showScene("char");
    }
  }, 25);
}

/* ================= CHARACTER SELECT ================= */
function enterGame(job) {
  selectedJob = job;
  console.log("Selected Job:", job);

  showScene("game");

  startGame();
}

/* ================= GAME START ================= */
function startGame() {
  console.log("GAME STARTED");

  // 之後這裡會放：
  // - 玩家生成
  // - 移動系統
  // - 地圖
  // - 怪物
}

</script>

</body>
</html>
