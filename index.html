<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RO Login 95%</title>

<style>
/* =========================
   基礎
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;

  background: url("https://raw.githubusercontent.com/chaiopi932-stack/roo-chaiopi/main/assets/bg/background.png")
    center/cover no-repeat;

  position: relative;
}

/* 暗角 + 景深 */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.1), rgba(0,0,0,0.55));
}

/* =========================
   LOGIN WINDOW（核心）
========================= */
.window {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 460px;

  background: linear-gradient(180deg, rgba(30,30,30,0.95), rgba(15,15,15,0.95));
  border: 1px solid rgba(214, 180, 106, 0.9);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255, 220, 140, 0.15);

  z-index: 10;

  animation: float 6s ease-in-out infinite;
}

/* 微浮動（遊戲感） */
@keyframes float {
  0%,100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -52%); }
}

/* =========================
   TITLE BAR（金色）
========================= */
.title {
  background: linear-gradient(180deg, #f6e3b2, #c9a457);
  padding: 10px 12px;

  font-weight: bold;
  color: #2a1a05;

  display: flex;
  justify-content: space-between;
  align-items: center;

  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
}

.title span:last-child {
  cursor: pointer;
  opacity: 0.7;
}

/* =========================
   CONTENT
========================= */
.content {
  padding: 22px;
  color: white;
}

.welcome {
  font-size: 14px;
  color: #e7d39a;
  margin-bottom: 14px;
}

/* =========================
   INPUT（RO風暗框）
========================= */
input {
  width: 100%;
  padding: 10px;

  margin-bottom: 10px;

  background: linear-gradient(180deg, #0f0f0f, #151515);
  border: 1px solid #444;

  color: white;
  outline: none;

  box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
}

/* =========================
   OK BUTTON（核心亮點）
========================= */
button {
  width: 100%;
  padding: 12px;

  margin-top: 6px;

  background: linear-gradient(180deg, #f7dc93, #b8862b);
  border: 1px solid #7a5a1f;

  font-weight: bold;
  cursor: pointer;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.6),
    0 0 10px rgba(255, 200, 120, 0.25);

  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
  box-shadow:
    0 6px 16px rgba(0,0,0,0.7),
    0 0 18px rgba(255, 210, 120, 0.45);
}

button:active {
  transform: scale(0.98);
}

/* =========================
   LINKS
========================= */
.links {
  margin-top: 12px;
  font-size: 12px;
  color: #d8c79a;
  text-align: center;
}

/* =========================
   SERVER LIST（木牌風）
========================= */
.server {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}

.server div {
  width: 110px;

  margin: 6px 0;
  padding: 8px 10px;

  text-align: center;
  font-size: 13px;

  color: white;

  background: linear-gradient(180deg, rgba(40,40,40,0.8), rgba(10,10,10,0.8));
  border: 1px solid rgba(200,160,80,0.9);

  cursor: pointer;

  transition: 0.2s;
}

.server div:hover {
  background: rgba(200,160,80,0.25);
  transform: translateX(-3px);
}

/* =========================
   小光點效果（RO感）
========================= */
.glow {
  position: absolute;
  width: 10px;
  height: 10px;

  background: rgba(255, 220, 140, 0.8);
  border-radius: 50%;

  box-shadow: 0 0 12px rgba(255,220,140,0.9);

  top: 20%;
  left: 30%;

  animation: glowMove 8s infinite;
}

@keyframes glowMove {
  0% { transform: translate(0,0); opacity: 0.3; }
  50% { transform: translate(120px, 80px); opacity: 1; }
  100% { transform: translate(0,0); opacity: 0.3; }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="window">

  <div class="title">
    <span>Login Window</span>
    <span>×</span>
  </div>

  <div class="content">
    <div class="welcome">Welcome to Midgard.</div>

    <input placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button>OK</button>

    <div class="links">
      Create Account | Find Password
    </div>
  </div>
</div>

<div class="server">
  <div>Prontera</div>
  <div>Geffen</div>
  <div>Izlude</div>
  <div>Alberta</div>
</div>

</body>
</html>
