<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Single MMO V2 Lite</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* LOGIN / CHAR / GAME */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* hidden */
.hidden { display: none; }

input {
  padding: 10px;
  margin: 5px;
}

button {
  padding: 10px 20px;
}

/* loading bar */
.bar-bg {
  width: 300px;
  height: 20px;
  background: #333;
}

.bar {
  width: 0%;
  height: 20px;
  background: gold;
}

/* game world */
#world {
  width: 100%;
  height: 100vh;
  background: #111;
  position: relative;
}

/* player */
#player {
  width: 30px;
  height: 30px;
  background: gold;
  position: absolute;
  left: 100px;
  top: 100px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <input id="acc" placeholder="Account">
  <input id="pw" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- LOADING -->
<div id="loading" class="screen hidden">
  <p>Loading...</p>
  <div class="bar-bg">
    <div class="bar"></div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="world">
    <div id="player"></div>
  </div>
</div>

<script>
let player = {
  x: 100,
  y: 100
};

/* ================= LOGIN ================= */
function login() {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  let p = 0;

  let t = setInterval(() => {
    p += 2;
    document.querySelector(".bar").style.width = p + "%";

    if (p >= 100) {
      clearInterval(t);
      startGame();
    }
  }, 30);
}

/* ================= GAME ================= */
function startGame() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.addEventListener("keydown", (e) => {

    if (e.key === "w") player.y -= 5;
    if (e.key === "s") player.y += 5;
    if (e.key === "a") player.x -= 5;
    if (e.key === "d") player.x += 5;

    update();
  });
}

/* ================= UPDATE ================= */
function update() {
  const p = document.getElementById("player");

  p.style.left = player.x + "px";
  p.style.top = player.y + "px";
}
</script>

</body>
</html>
