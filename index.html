<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>V2 MMO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* ================= LOGIN ================= */
#login, #loading, #charSelect {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  margin: 5px;
  padding: 10px;
}

button {
  padding: 10px 20px;
  cursor: pointer;
}

/* ================= LOADING ================= */
#loading {
  display: none;
}

.bar-bg {
  width: 300px;
  height: 20px;
  background: #333;
}

.bar {
  height: 20px;
  width: 0%;
  background: gold;
}

/* ================= CHAR SELECT ================= */
#charSelect {
  display: none;
}

.char {
  padding: 10px;
  margin: 10px;
  background: #222;
  cursor: pointer;
}

/* ================= GAME ================= */
#game {
  display: none;
}

#world {
  width: 100%;
  height: 100vh;
  background: #111;
  position: relative;
}

.player {
  width: 30px;
  height: 30px;
  background: gold;
  position: absolute;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <input id="acc" placeholder="Account">
  <input id="pw" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- LOADING -->
<div id="loading">
  <p>Loading World...</p>
  <div class="bar-bg">
    <div class="bar"></div>
  </div>
</div>

<!-- CHAR SELECT -->
<div id="charSelect">
  <div class="char" onclick="selectClass('swordman')">⚔ Swordman</div>
  <div class="char" onclick="selectClass('mage')">🔮 Mage</div>
</div>

<!-- GAME -->
<div id="game">
  <div id="world"></div>
</div>

<script>
let ws;
let player = {
  class: null,
  x: 100,
  y: 100
};

/* ================= LOGIN ================= */
function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("loading").style.display = "flex";

  let p = 0;
  let t = setInterval(() => {
    p += 2;
    document.querySelector(".bar").style.width = p + "%";

    if (p >= 100) {
      clearInterval(t);
      showChar();
    }
  }, 30);
}

/* ================= CHAR ================= */
function showChar() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("charSelect").style.display = "flex";
}

function selectClass(type) {
  player.class = type;

  document.getElementById("charSelect").style.display = "none";
  startGame();
}

/* ================= GAME ================= */
function startGame() {
  document.getElementById("game").style.display = "block";

  ws = new WebSocket("ws://localhost:3000");

  ws.onopen = () => {
    console.log("Connected");
  };

  ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);

    render(data.players);
  };

  document.addEventListener("keydown", (e) => {
    if (e.key === "w") player.y -= 5;
    if (e.key === "s") player.y += 5;
    if (e.key === "a") player.x -= 5;
    if (e.key === "d") player.x += 5;

    ws.send(JSON.stringify({
      type: "move",
      x: player.x,
      y: player.y
    }));
  });
}

/* ================= RENDER ================= */
function render(players) {
  const world = document.getElementById("world");
  world.innerHTML = "";

  players.forEach(p => {
    let div = document.createElement("div");
    div.className = "player";
    div.style.left = p.x + "px";
    div.style.top = p.y + "px";
    world.appendChild(div);
  });
}
</script>

</body>
</html>
