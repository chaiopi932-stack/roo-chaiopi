<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>RO Login Ultimate</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* =========================
   背景（視差 + 呼吸暗光）
========================= */
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;

  background: url("https://raw.githubusercontent.com/chaiopi932-stack/roo-chaiopi/main/assets/bg/background.png")
    center/cover no-repeat;

  position: relative;
  animation: bgMove 12s ease-in-out infinite;
}

/* 微視差 */
@keyframes bgMove {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* 暗層 */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(0,0,0,0.1),
    rgba(0,0,0,0.6));
}

/* =========================
   FLOAT LOGIN WINDOW
========================= */
.window {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 470px;

  background: linear-gradient(180deg, rgba(25,25,25,0.95), rgba(10,10,10,0.95));
  border: 1px solid rgba(210,170,90,0.9);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.85),
    inset 0 0 12px rgba(255,220,140,0.12);

  animation: float 5s ease-in-out infinite;
  z-index: 10;
}

/* 浮動 */
@keyframes float {
  0%,100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, -52%); }
}

/* =========================
   TITLE BAR（金色流光）
========================= */
.title {
  position: relative;
  padding: 10px 12px;

  background: linear-gradient(90deg,
    #f7e3b0,
    #caa457,
    #f7e3b0);

  background-size: 200% 100%;
  animation: shimmer 4s linear infinite;

  font-weight: bold;
  color: #2a1a05;

  display: flex;
  justify-content: space-between;
}

@keyframes shimmer {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

/* =========================
   CONTENT
========================= */
.content {
  padding: 22px;
  color: white;
}

.welcome {
  font-size: 14px;
  color: #e7d39a;
  margin-bottom: 14px;
}

/* =========================
   INPUT
========================= */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;

  background: #0f0f0f;
  border: 1px solid #444;

  color: white;
  outline: none;

  box-shadow: inset 0 0 6px rgba(0,0,0,0.9);
}

/* focus glow */
input:focus {
  border-color: #d8b46a;
  box-shadow: 0 0 10px rgba(255,210,120,0.3);
}

/* =========================
   OK BUTTON（核心動畫）
========================= */
button {
  width: 100%;
  padding: 13px;
  margin-top: 6px;

  background: linear-gradient(180deg, #f7dc93, #b8862b);
  border: 1px solid #7a5a1f;

  font-weight: bold;
  cursor: pointer;

  position: relative;
  overflow: hidden;

  box-shadow:
    0 5px 20px rgba(0,0,0,0.7),
    0 0 18px rgba(255,210,120,0.25);

  transition: 0.2s;
}

/* 光掃過 */
button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;

  width: 100%;
  height: 100%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );

  transition: 0.5s;
}

button:hover::before {
  left: 100%;
}

button:hover {
  transform: scale(1.03);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    0 0 25px rgba(255,220,140,0.5);
}

button:active {
  transform: scale(0.98);
}

/* =========================
   SERVER MENU（點擊選中）
========================= */
.server {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}

.server div {
  width: 120px;
  padding: 8px;

  margin: 6px 0;
  text-align: center;

  background: rgba(0,0,0,0.55);
  border: 1px solid #caa457;

  color: white;
  cursor: pointer;

  transition: 0.2s;
}

.server div:hover {
  transform: translateX(-4px);
  background: rgba(200,160,80,0.25);
}

/* selected state */
.server div.active {
  background: rgba(210,170,90,0.35);
  box-shadow: 0 0 10px rgba(255,210,120,0.4);
}

/* =========================
   光粒子
========================= */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;

  background: rgba(255,220,140,0.8);
  border-radius: 50%;

  box-shadow: 0 0 10px rgba(255,220,140,0.9);

  animation: move 8s infinite linear;
}

@keyframes move {
  0% { transform: translate(0,0); opacity: 0.2; }
  50% { opacity: 1; }
  100% { transform: translate(200px,-120px); opacity: 0; }
}
</style>
</head>

<body>

<!-- particles -->
<div class="particle" style="top:20%;left:30%"></div>
<div class="particle" style="top:60%;left:70%"></div>

<!-- login -->
<div class="window">

  <div class="title">
    <span>Login Window</span>
    <span>×</span>
  </div>

  <div class="content">
    <div class="welcome">Welcome to Midgard.</div>

    <input placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button>OK</button>

    <div style="text-align:center;margin-top:12px;color:#d8c79a;font-size:12px;">
      Create Account | Find Password
    </div>
  </div>
</div>

<!-- server -->
<div class="server">
  <div class="active">Prontera</div>
  <div>Geffen</div>
  <div>Izlude</div>
  <div>Alberta</div>
</div>

</body>
</html>
