<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ragnarok Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="vignette"></div>

<div class="logo">RAGNAROK ONLINE</div>

<div class="window">

  <div class="title-bar">
    Login Window
  </div>

  <div class="content">

    <div id="typing"></div>

    <input type="text" placeholder="Account ID">
    <input type="password" placeholder="Password">

    <button onclick="login()">OK</button>

    <div class="links">
      Create Account | Find Password
    </div>

  </div>

</div>

<audio id="bgm" loop></audio>
<audio id="click"></audio>

<script src="game.js"></script>

</body>
</html>
